name: Terraform WAF Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      action:
        description: "Terraform action"
        required: true
        type: choice
        options:
          - apply
          - plan
          - destroy
      aws_region:
        description: "AWS Region"
        required: false
        default: "us-east-1"
      terraform_variable_file:
        description: "Terraform variable file name"
        required: false
        default: "b2c-microservices-waf-orch.tfvars"

env:
  TF_IN_AUTOMATION: "true"
  WORKSPACE_DIR: "waf-alb-project"
  TF_STATE_BUCKET: "biz2x-waf-terraform-bucket"
  AWS_REGION: ${{ github.event.inputs.aws_region || 'us-east-1' }}
  AWS_ROLE_ARN: "arn:aws:iam::892669526097:role/splitwise-assume-role"

permissions:
  id-token: write   # Required for OIDC authentication
  contents: read

jobs:
  # ── Validate Parameters ──────────────────────────────────────
  validate:
    name: Validate Parameters
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      environment: ${{ github.event.inputs.environment }}
      action: ${{ github.event.inputs.action }}
      tfvars_file: ${{ github.event.inputs.terraform_variable_file }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate tfvars file exists
        run: |
          TFVARS="${{ env.WORKSPACE_DIR }}/environments/${{ github.event.inputs.environment }}/${{ github.event.inputs.terraform_variable_file }}"
          echo "Environment : ${{ github.event.inputs.environment }}"
          echo "Action      : ${{ github.event.inputs.action }}"
          echo "Checking    : ${TFVARS}"
          if [ ! -f "${TFVARS}" ]; then
            echo "ERROR: Missing tfvars file: ${TFVARS}"
            exit 1
          fi
          echo "tfvars file found: ${TFVARS}"

  # ── Terraform Plan ───────────────────────────────────────────
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.3"

      - name: Terraform Init
        working-directory: ${{ env.WORKSPACE_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=waf-alb/${{ github.event.inputs.environment }}/${{ github.event.inputs.terraform_variable_file }}.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -reconfigure

      - name: Terraform Plan
        working-directory: ${{ env.WORKSPACE_DIR }}
        run: |
          DESTROY_FLAG=""
          if [ "${{ github.event.inputs.action }}" == "destroy" ]; then
            DESTROY_FLAG="-destroy"
          fi

          terraform plan \
            ${DESTROY_FLAG} \
            -var-file="environments/${{ github.event.inputs.environment }}/${{ github.event.inputs.terraform_variable_file }}" \
            -out=tfplan.binary

          terraform show -json tfplan.binary > plan.json
          python3 plan.py plan.json
          terraform show -no-color tfplan.binary > tfplan.txt

      - name: Upload plan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: |
            ${{ env.WORKSPACE_DIR }}/tfplan.binary
            ${{ env.WORKSPACE_DIR }}/tfplan.txt
          retention-days: 7

      - name: Print plan summary
        working-directory: ${{ env.WORKSPACE_DIR }}
        run: |
          echo "### Terraform Plan Summary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "^Plan:|No changes" tfplan.txt || echo "See full plan in artifacts" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ── Approval Gate ────────────────────────────────────────────
  approval:
    name: Manual Approval
    runs-on: ubuntu-latest
    needs: plan
    if: ${{ github.event.inputs.action != 'plan' }}
    environment:
      name: ${{ github.event.inputs.environment }}   # Uses GitHub Environment protection rules for approval
    steps:
      - name: Approval granted
        run: |
          echo "Approval granted for ${{ github.event.inputs.action }} on ${{ github.event.inputs.environment }}"

  # ── Terraform Apply ──────────────────────────────────────────
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: approval
    if: ${{ github.event.inputs.action == 'apply' }}
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.3"

      - name: Terraform Init
        working-directory: ${{ env.WORKSPACE_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=waf-alb/${{ github.event.inputs.environment }}/${{ github.event.inputs.terraform_variable_file }}.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -reconfigure

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: ${{ env.WORKSPACE_DIR }}

      - name: Terraform Apply
        working-directory: ${{ env.WORKSPACE_DIR }}
        run: terraform apply -auto-approve tfplan.binary

      - name: Terraform Outputs
        working-directory: ${{ env.WORKSPACE_DIR }}
        run: |
          terraform output -no-color | tee tf-outputs.txt
          echo "### Terraform Outputs" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat tf-outputs.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload outputs artifact
        uses: actions/upload-artifact@v4
        with:
          name: tf-outputs-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: ${{ env.WORKSPACE_DIR }}/tf-outputs.txt
          retention-days: 7

  # ── Terraform Destroy ────────────────────────────────────────
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    needs: approval
    if: ${{ github.event.inputs.action == 'destroy' }}
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.3"

      - name: Terraform Init
        working-directory: ${{ env.WORKSPACE_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=waf-alb/${{ github.event.inputs.environment }}/${{ github.event.inputs.terraform_variable_file }}.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -reconfigure

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: ${{ env.WORKSPACE_DIR }}

      - name: Terraform Destroy
        working-directory: ${{ env.WORKSPACE_DIR }}
        run: terraform apply -auto-approve tfplan.binary
